name: Build & Test Haisa Dev

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: gradle-

    - name: Setup Gradle Wrapper
      run: |
        chmod +x gradlew || true
        mkdir -p gradle/wrapper
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          wget -q https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar
        fi
        if [ ! -f gradle/wrapper/gradle-wrapper.properties ]; then
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "networkTimeout=10000" >> gradle/wrapper/gradle-wrapper.properties
          echo "validateDistributionUrl=true" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        fi
        if [ ! -f gradlew ]; then
          wget -q https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradlew -O gradlew
          chmod +x gradlew
        fi

    - name: Build SDK module
      run: |
        cd $GITHUB_WORKSPACE
        ./gradlew :haisa-sdk:assembleDebug --no-daemon --stacktrace 2>&1 || echo "BUILD_ISSUE_DETECTED"

    - name: Run SDK Unit Tests
      run: |
        cd $GITHUB_WORKSPACE
        ./gradlew :haisa-sdk:testDebugUnitTest --no-daemon --stacktrace 2>&1 || echo "TEST_ISSUE_DETECTED"

    - name: Build Terminal Emulator module
      run: |
        cd $GITHUB_WORKSPACE
        ./gradlew :terminal-emulator:assembleDebug --no-daemon --stacktrace 2>&1 || echo "BUILD_ISSUE_DETECTED"

    - name: Build App module
      run: |
        cd $GITHUB_WORKSPACE
        ./gradlew :app:assembleDebug --no-daemon --stacktrace 2>&1 || echo "BUILD_ISSUE_DETECTED"

    - name: Run App Unit Tests
      run: |
        cd $GITHUB_WORKSPACE
        ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace 2>&1 || echo "TEST_ISSUE_DETECTED"

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          **/build/test-results/
          **/build/reports/

    - name: Upload Build Artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: build-outputs
        path: |
          app/build/outputs/apk/
          haisa-sdk/build/outputs/aar/

  create-release:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: gradle-

    - name: Setup Gradle Wrapper
      run: |
        chmod +x gradlew || true
        mkdir -p gradle/wrapper
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          wget -q https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar
        fi
        if [ ! -f gradle/wrapper/gradle-wrapper.properties ]; then
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "networkTimeout=10000" >> gradle/wrapper/gradle-wrapper.properties
          echo "validateDistributionUrl=true" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        fi
        if [ ! -f gradlew ]; then
          wget -q https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradlew -O gradlew
          chmod +x gradlew
        fi

    - name: Build Release APK
      run: |
        cd $GITHUB_WORKSPACE
        ./gradlew :app:assembleRelease --no-daemon --stacktrace

    - name: Build Release AAR
      run: |
        cd $GITHUB_WORKSPACE
        ./gradlew :haisa-sdk:assembleRelease --no-daemon --stacktrace

    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Haisa Dev v${{ steps.version.outputs.VERSION }}
        body_path: CHANGELOG.md
        draft: false
        prerelease: false
        files: |
          app/build/outputs/apk/release/*.apk
          haisa-sdk/build/outputs/aar/release/*.aar

  build-modules:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Package modules
      run: |
        bash scripts/generate-index.sh
        echo "Module index generated"

    - name: Commit Module Index
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add docs/repo-index.json
        git diff --cached --quiet || git commit -m "chore: update module index [skip ci]"
        git push
